{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>إضافة دواء جديد</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">الاسم التجاري (Brand Name)</label>
                            <input type="text" name="name" class="form-control" placeholder="مثال: Panadol Advance"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">المادة الفعالة (Active Ingredient)</label>
                            <input type="text" name="active_ingredient" class="form-control"
                                placeholder="مثال: Paracetamol" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الآثار الجانبية (Side Effects)</label>
                            <textarea name="side_effects" class="form-control" rows="3"
                                placeholder="أدخل الآثار الجانبية هنا..."></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الكمية (Quantity)</label>
                                <input type="number" name="quantity" class="form-control" value="0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">السعر (Price per unit)</label>
                                <input type="number" step="0.01" name="price" class="form-control" value="0.00"
                                    required>
                            </div>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">حفظ الدواء</button>
                            <a href="{{ url_for('pharmacist.inventory') }}" class="btn btn-outline-secondary">إلغاء</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
