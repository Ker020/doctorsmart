{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0 rounded-3">
            <div class="card-header bg-primary text-white p-3">
                <h4 class="mb-0"><i class="bi bi-qr-code-scan me-2"></i>Scan Patient QR Code</h4>
            </div>
            <div class="card-body text-center p-4">
                <div id="reader"
                    style="width: 100%; min-height: 300px; border-radius: 10px; overflow: hidden; background: #eee;">
                </div>

                <div class="mt-4">
                    <p class="text-muted mb-3">Or enter token manually:</p>
                    <form method="POST" action="{{ post_url }}" id="manualForm">
                        <div class="input-group">
                            <input type="text" name="token" class="form-control" placeholder="Enter token hash..."
                                required>
                            <button class="btn btn-outline-primary" type="button" onclick="submitManual()">
                                <i class="bi bi-arrow-right"></i> Verify
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Hidden form for scanner submission -->
                <form method="POST" action="{{ post_url }}" id="scanForm" style="display:none;">
                    <input type="hidden" name="token" id="hiddenToken">
                </form>
            </div>
        </div>
    </div>
</div>

<!-- HTML5-QRCode Library -->
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script>
    function onScanSuccess(decodedText, decodedResult) {
        // Handle the scanned code as you like, for example:
        console.log(`Code matched = ${decodedText}`, decodedResult);

        // Stop scanning
        html5QrcodeScanner.clear();

        // Submit form
        document.getElementById('hiddenToken').value = decodedText;
        document.getElementById('scanForm').submit();
    }

    function onScanFailure(error) {
        // handle scan failure, usually better to ignore and keep scanning.
        // console.warn(`Code scan error = ${error}`);
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: { width: 250, height: 250 } },
        /* verbose= */ false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);

    function submitManual() {
        document.getElementById('manualForm').submit();
    }
</script>
{% endblock %}
