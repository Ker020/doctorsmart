{% extends "base.html" %}

{% block content %}
<style>
    .vitals-header {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        color: white;
        padding: 2rem;
        border-radius: 20px;
        box-shadow: 0 10px 20px rgba(30, 60, 114, 0.2);
    }

    .vital-card {
        border: none;
        border-radius: 24px;
        background: var(--card-bg, #fff);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .vital-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
    }

    .vital-icon-container {
        width: 60px;
        height: 60px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
    }

    .vital-value {
        font-size: 2.5rem;
        font-weight: 800;
        margin: 0;
    }

    .vital-unit {
        font-size: 1rem;
        color: #6c757d;
        font-weight: 600;
    }

    .status-badge {
        font-size: 0.85rem;
        padding: 0.5rem 1rem;
        border-radius: 50rem;
        font-weight: 600;
    }

    .pulse-animation {
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    /* Gradient colors for icons */
    .bg-gradient-danger { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; }
    .bg-gradient-info { background: linear-gradient(135deg, #00c6ff, #0072ff); color: white; }
    .bg-gradient-warning { background: linear-gradient(135deg, #f7971e, #ffd200); color: white; }
    .bg-gradient-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
</style>

<div class="container-fluid py-4">
    <!-- Header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="vitals-header d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div class="d-flex align-items-center">
                    <a href="{{ url_for('patient.dashboard') }}" class="btn btn-light rounded-circle me-3 shadow-sm" style="width: 45px; height: 45px; padding: 0; display: flex; align-items: center; justify-content: center;">
                        <i class="bi bi-arrow-left fs-5"></i>
                    </a>
                    <div>
                        <h2 class="fw-bold mb-0">Live Vital Signs</h2>
                        <p class="mb-0 opacity-75">Real-time monitoring</p>
                    </div>
                </div>
                <div class="d-flex align-items-center bg-white bg-opacity-25 rounded-pill px-4 py-2">
                    <div class="spinner-grow spinner-grow-sm text-light me-2" role="status"></div>
                    <span class="fw-bold">Live Synced</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Vitals -->
    <div class="row g-4 mb-4">
        <!-- BPM -->
        <div class="col-md-4 col-sm-6">
            <div class="vital-card p-4 h-100">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="vital-icon-container bg-gradient-danger shadow-sm">
                        <i class="bi bi-heart-pulse-fill pulse-animation"></i>
                    </div>
                    <span class="badge bg-danger-soft text-danger status-badge" id="bpm-status">Tracking</span>
                </div>
                <h5 class="text-muted fw-bold mb-1">Heart Rate (BPM)</h5>
                <div class="d-flex align-items-baseline gap-2">
                    <span class="vital-value text-dark" id="bpm-value">--</span>
                    <span class="vital-unit">bpm</span>
                </div>
            </div>
        </div>

        <!-- SpO2 -->
        <div class="col-md-4 col-sm-6">
            <div class="vital-card p-4 h-100">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="vital-icon-container bg-gradient-info shadow-sm">
                        <i class="bi bi-droplet-fill"></i>
                    </div>
                    <span class="badge bg-info-soft text-info status-badge" id="spo2-status">Tracking</span>
                </div>
                <h5 class="text-muted fw-bold mb-1">Blood Oxygen (SpO2)</h5>
                <div class="d-flex align-items-baseline gap-2">
                    <span class="vital-value text-dark" id="spo2-value">--</span>
                    <span class="vital-unit">%</span>
                </div>
            </div>
        </div>

        <!-- Temperature -->
        <div class="col-md-4 col-sm-6">
            <div class="vital-card p-4 h-100">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="vital-icon-container bg-gradient-warning shadow-sm">
                        <i class="bi bi-thermometer-high"></i>
                    </div>
                    <span class="badge bg-warning-soft text-warning status-badge" id="temp-status">Tracking</span>
                </div>
                <h5 class="text-muted fw-bold mb-1">Body Temperature</h5>
                <div class="d-flex align-items-baseline gap-2">
                    <span class="vital-value text-dark" id="temp-value">--</span>
                    <span class="vital-unit">°C</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Status & Information -->
    <div class="row g-4">
        <!-- Body State -->
        <div class="col-md-6">
            <div class="vital-card p-4 d-flex align-items-center h-100">
                <div class="vital-icon-container bg-gradient-success shadow-sm me-4 flex-shrink-0">
                    <i class="bi bi-person-standing"></i>
                </div>
                <div>
                    <h5 class="text-muted fw-bold mb-1">Body State</h5>
                    <h3 class="fw-bold mb-0 text-dark" id="body-state">--</h3>
                </div>
            </div>
        </div>

        <!-- Sensor Status -->
        <div class="col-md-6">
            <div class="vital-card p-4 d-flex align-items-center h-100">
                <div class="vital-icon-container bg-secondary bg-opacity-25 text-secondary shadow-sm me-4 flex-shrink-0" id="sensor-icon-bg">
                    <i class="bi bi-hand-index-thumb"></i>
                </div>
                <div>
                    <h5 class="text-muted fw-bold mb-1">Sensor Status</h5>
                    <h3 class="fw-bold mb-0 text-dark" id="finger-detected">--</h3>
                </div>
            </div>
        </div>
        
        <div class="col-12 mt-3 text-end">
            <p class="text-muted small">Last updated: <span id="last-updated">--</span></p>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://api.orcagroup.top/health/get";
    
    async function fetchVitalSigns() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if (data.status === "success" && data.data && data.data.length > 0) {
                // Get the most recent reading (assuming first item is latest or they are ordered)
                const latest = data.data[0];
                
                // Update BPM
                document.getElementById('bpm-value').textContent = latest.bpm;
                const bpmStatus = document.getElementById('bpm-status');
                if (latest.bpm === 0) {
                    bpmStatus.textContent = "No Signal";
                    bpmStatus.className = "badge bg-secondary text-white status-badge";
                } else if (latest.bpm < 60 || latest.bpm > 100) {
                    bpmStatus.textContent = "Abnormal";
                    bpmStatus.className = "badge bg-danger text-white status-badge";
                } else {
                    bpmStatus.textContent = "Normal";
                    bpmStatus.className = "badge bg-success text-white status-badge";
                }

                // Update SpO2
                document.getElementById('spo2-value').textContent = latest.spo2;
                const spo2Status = document.getElementById('spo2-status');
                if (latest.spo2 < 90) {
                    spo2Status.textContent = "Low";
                    spo2Status.className = "badge bg-danger text-white status-badge";
                } else {
                    spo2Status.textContent = "Normal";
                    spo2Status.className = "badge bg-success text-white status-badge";
                }

                // Update Temperature
                const tempVal = parseFloat(latest.temperature).toFixed(1);
                document.getElementById('temp-value').textContent = tempVal;
                const tempStatus = document.getElementById('temp-status');
                if (tempVal > 37.5) {
                    tempStatus.textContent = "Fever";
                    tempStatus.className = "badge bg-danger text-white status-badge";
                } else if (tempVal < 35.0) {
                    tempStatus.textContent = "Low";
                    tempStatus.className = "badge bg-warning text-dark status-badge";
                } else {
                    tempStatus.textContent = "Normal";
                    tempStatus.className = "badge bg-success text-white status-badge";
                }

                // Update Body State
                document.getElementById('body-state').textContent = latest.body_state || "Unknown";

                // Update Finger Detection
                const fingerDetected = latest.finger_detected === 1;
                document.getElementById('finger-detected').textContent = fingerDetected ? "Finger Detected" : "No Finger Detected";
                const sensorIconBg = document.getElementById('sensor-icon-bg');
                if (fingerDetected) {
                    sensorIconBg.className = "vital-icon-container bg-gradient-success shadow-sm me-4 flex-shrink-0";
                } else {
                    sensorIconBg.className = "vital-icon-container bg-secondary bg-opacity-25 text-secondary shadow-sm me-4 flex-shrink-0";
                }

                // Update timestamp
                document.getElementById('last-updated').textContent = latest.timestamp;
            }
        } catch (error) {
            console.error("Error fetching vital signs:", error);
        }
    }

    // Initial fetch
    fetchVitalSigns();
    
    // Set interval to fetch every 3 seconds
    setInterval(fetchVitalSigns, 3000);
</script>
{% endblock %}
