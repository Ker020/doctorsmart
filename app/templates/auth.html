{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="text-center mb-4">{% if register %}Register{% else %}Login{% endif %}</h2>

            <form method="POST">
                {% if register %}
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                {% if register %}
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select name="role" id="roleSelect" class="form-select" onchange="toggleFields()">
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                        <option value="pharmacist">Pharmacist</option>
                    </select>
                </div>

                <!-- Patient Specific Fields -->
                <div id="patientFields">
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label small text-muted">Weight (kg)</label>
                            <input type="number" name="weight" class="form-control" step="0.1">
                        </div>
                        <div class="col-6">
                            <label class="form-label small text-muted">Height (cm)</label>
                            <input type="number" name="height" class="form-control" step="0.1">
                        </div>
                    </div>
                </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100">
                    {% if register %}Sign Up{% else %}Sign In{% endif %}
                </button>
            </form>

            <script>
                function toggleFields() {
                    const role = document.getElementById('roleSelect');
                    const fields = document.getElementById('patientFields');
                    if (role && fields) {
                        fields.style.display = role.value === 'patient' ? 'block' : 'none';
                    }
                }
            </script>

            <div class="mt-3 text-center">
                {% if register %}
                <a href="{{ url_for('auth.login') }}">Already have an account? Login</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
